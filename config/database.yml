default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: 127.0.0.1
  port: 5432
  username: <%= ENV.fetch("PGUSER", "rails") %>
  password: <%= ENV.fetch("PGPASSWORD", "rails123") %>

development:
  <<: *default
  database: jukebox_development

test:
  <<: *default
  database: jukebox_test

production:
  primary: &primary_production
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    database_tasks: false
  queue:
    <<: *primary_production
    database_tasks: false
  cable:
    <<: *primary_production
    database_tasks: false
